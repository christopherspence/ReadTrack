<div class="col-md-6 d-flex justify-content-center pt-4">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                Reading Time
            </mat-card-title>
        </mat-card-header>
        <mat-card-content>    
            <div *ngIf="!dataLoaded">
                Loading data...
            </div>    
            <div *ngIf="dataLoaded">    
                <canvas baseChart
                    [data]="lineChartData"
                    [options]="lineChartOptions"
                    [legend]="lineChartLegend"
                    [type]="'line'">
                </canvas>            
            </div>
        </mat-card-content>
    </mat-card>
</div>
